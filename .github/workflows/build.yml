name: Build GdeBenz app (Android / iOS / Windows / Linux)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  linux:
    name: Linux (AppImage + deb + rpm)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm install

      - name: Generate icons
        run: npx tauri icon app-icon.png

      - name: Build
        run: npx tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: GdeBenz-linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error

  windows:
    name: Windows (EXE)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm install

      - name: Generate icons
        run: npx tauri icon app-icon.png

      - name: Build
        run: npx tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: GdeBenz-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/GdeBenz.exe
          if-no-files-found: error

  macos:
    name: macOS (DMG)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm install

      - name: Generate icons
        run: npx tauri icon app-icon.png

      - name: Build (universal)
        run: npx tauri build --target universal-apple-darwin

      - uses: actions/upload-artifact@v4
        with:
          name: GdeBenz-macos
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  android:
    name: Android (APK)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"
          echo "Using preinstalled NDK: $ANDROID_NDK_LATEST_HOME"
          echo "NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm install

      - name: Init Android project
        run: npx tauri android init

      - name: Add geolocation permissions to AndroidManifest
        run: |
          python3 - <<'EOF'
          import glob
          p = glob.glob('src-tauri/gen/android/**/src/main/AndroidManifest.xml', recursive=True)[0]
          s = open(p).read()
          perms = ('<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n'
                   '    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    ')
          if 'ACCESS_FINE_LOCATION' not in s:
              s = s.replace('<application', perms + '<application', 1)
              open(p, 'w').write(s)
          print(p)
          print(s[:800])
          EOF

      - name: Add home-screen widgets (launchers)
        run: |
          MAIN=$(dirname "$(find src-tauri/gen/android -path '*/src/main/AndroidManifest.xml' | head -1)")
          echo "Android main dir: $MAIN"
          mkdir -p "$MAIN/java/ru/gdebenz/client" "$MAIN/res/layout" "$MAIN/res/xml"
          cp src-tauri/android-widget/kt/*.kt "$MAIN/java/ru/gdebenz/client/"
          cp src-tauri/android-widget/layout/*.xml "$MAIN/res/layout/"
          cp src-tauri/android-widget/xml/*.xml "$MAIN/res/xml/"
          python3 - "$MAIN/AndroidManifest.xml" <<'EOF'
          import sys
          p = sys.argv[1]
          s = open(p).read()
          widgets = {
              'GdeBenzWidget': 'gdebenz_widget_info',
              'GdeBenzWidgetSmall': 'gdebenz_widget_info_small',
              'GdeBenzWidgetWide': 'gdebenz_widget_info_wide',
              'GdeBenzWidgetMap': 'gdebenz_widget_info_map',
          }
          block = ''
          for cls, info in widgets.items():
              if ('".' + cls + '"') in s:
                  continue
              block += (
                  '<receiver android:name=".' + cls + '" android:exported="false">'
                  '<intent-filter><action android:name="android.appwidget.action.APPWIDGET_UPDATE" /></intent-filter>'
                  '<meta-data android:name="android.appwidget.provider" android:resource="@xml/' + info + '" />'
                  '</receiver>'
              )
          if block:
              s = s.replace('</application>', block + '</application>', 1)
              open(p, 'w').write(s)
          print('widgets registered:', list(widgets))
          EOF

      - name: Generate icons
        run: npx tauri icon app-icon.png

      - name: Build APK
        run: npx tauri android build --apk

      - name: Sign APK
        run: |
          BT="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)"
          echo "Using build-tools: $BT"
          UNSIGNED=$(find src-tauri/gen/android -name "*-unsigned.apk" | head -1)
          echo "Unsigned APK: $UNSIGNED"
          keytool -genkeypair -keystore ks.jks -alias gdebenz -keyalg RSA -keysize 2048 \
            -validity 10000 -storepass gdebenz123 -keypass gdebenz123 \
            -dname "CN=GdeBenz, O=GdeBenz, C=RU"
          "$BT/zipalign" -f 4 "$UNSIGNED" GdeBenz-aligned.apk
          "$BT/apksigner" sign --ks ks.jks --ks-pass pass:gdebenz123 \
            --out GdeBenz.apk GdeBenz-aligned.apk
          "$BT/apksigner" verify GdeBenz.apk

      - uses: actions/upload-artifact@v4
        with:
          name: GdeBenz-android-apk
          path: GdeBenz.apk
          if-no-files-found: error

  ios:
    name: iOS (IPA, без подписи)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm install

      - name: Init iOS project
        run: npx tauri ios init

      - name: Add geolocation usage description to Info.plist
        run: |
          PL=$(find src-tauri/gen/apple -name Info.plist -path "*_iOS*" | head -1)
          if [ -z "$PL" ]; then PL=$(find src-tauri/gen/apple -name Info.plist | head -1); fi
          echo "Plist: $PL"
          /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string Приложение использует геолокацию, чтобы показывать АЗС рядом с вами" "$PL" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSLocationWhenInUseUsageDescription Приложение использует геолокацию, чтобы показывать АЗС рядом с вами" "$PL"
          plutil -p "$PL" | grep -i location

      - name: Generate icons
        run: npx tauri icon app-icon.png

      - name: Build Rust library for iOS
        run: |
          cargo build --manifest-path src-tauri/Cargo.toml --lib --release --target aarch64-apple-ios
          # The Xcode project links -lapp from Externals/arm64/release
          mkdir -p src-tauri/gen/apple/Externals/arm64/release
          cp src-tauri/target/aarch64-apple-ios/release/libgdebenz_lib.a \
             src-tauri/gen/apple/Externals/arm64/release/libapp.a

      - name: Disable Xcode Rust build phase (lib is prebuilt)
        run: |
          python3 - <<'EOF'
          import glob
          p = glob.glob('src-tauri/gen/apple/*.xcodeproj/project.pbxproj')[0]
          s = open(p).read()
          needle = 'npm run -- tauri ios xcode-script'
          assert needle in s, 'xcode-script phase not found in ' + p
          s = s.replace(needle, 'true || npm run -- tauri ios xcode-script')
          open(p, 'w').write(s)
          print('patched', p)
          EOF

      - name: Build .app without code signing
        run: |
          PROJ=$(ls -d src-tauri/gen/apple/*.xcodeproj | head -1)
          echo "Project: $PROJ"
          SCHEME=$(xcodebuild -project "$PROJ" -list -json | \
            jq -r '.project.schemes[] | select(test("_iOS$"))' | head -1)
          echo "Scheme: $SCHEME"
          xcodebuild -project "$PROJ" -scheme "$SCHEME" -configuration release \
            -sdk iphoneos -derivedDataPath xcbuild \
            CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
            build

      - name: Package IPA
        run: |
          APP=$(ls -d xcbuild/Build/Products/*-iphoneos/*.app | head -1)
          echo "App bundle: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -qry GdeBenz-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: GdeBenz-ios-ipa
          path: GdeBenz-unsigned.ipa
          if-no-files-found: error

  release:
    name: Publish release
    needs: [linux, windows, macos, android, ios]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read app version
        id: ver
        run: echo "version=$(jq -r .version src-tauri/tauri.conf.json)" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List files
        run: find dist -type f

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: GdeBenz ${{ steps.ver.outputs.version }}
          body: |
            Готовые файлы приложения GdeBenz (gdebenz.ru / gdebenz.org):

            - **GdeBenz.apk** — Android (разрешите установку из неизвестных источников)
            - **GdeBenz-unsigned.ipa** — iOS, установка через AltStore или Sideloadly
            - **GdeBenz_*_x64-setup.exe** — установщик для Windows
            - **GdeBenz.exe** — Windows без установки (portable)
            - **GdeBenz_*_universal.dmg** — macOS (Intel и Apple Silicon; первый запуск: правый клик → Открыть)
            - **GdeBenz_*_amd64.AppImage** — Linux, универсальный (сделайте исполняемым и запускайте)
            - **GdeBenz_*_amd64.deb** — Linux (Ubuntu/Debian)
          files: |
            dist/GdeBenz-android-apk/GdeBenz.apk
            dist/GdeBenz-ios-ipa/GdeBenz-unsigned.ipa
            dist/GdeBenz-windows/bundle/nsis/*.exe
            dist/GdeBenz-windows/GdeBenz.exe
            dist/GdeBenz-macos/*.dmg
            dist/GdeBenz-linux/appimage/*.AppImage
            dist/GdeBenz-linux/deb/*.deb
